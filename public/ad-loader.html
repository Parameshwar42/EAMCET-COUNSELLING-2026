<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; }
  </style>
</head>
<body>
  <script type="text/javascript">
    const urlParams = new URLSearchParams(window.location.search);
    const key = urlParams.get('key');
    const width = parseInt(urlParams.get('width'), 10);
    const height = parseInt(urlParams.get('height'), 10);

    if (key && width && height) {
      window.atOptions = {
        'key' : key,
        'format' : 'iframe',
        'height' : height,
        'width' : width,
        'params' : {}
      };

      const script = document.createElement('script');
      script.type = 'text/javascript';
      script.src = '//www.highperformanceformat.com/' + key + '/invoke.js';
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
